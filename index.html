<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>학교 일정 관리</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">개인 학교 일정</p>
          <h1>학교 일정 관리</h1>
        </div>
        <div class="topbar-actions">
          <button class="icon-button" id="exportButton" type="button" aria-label="일정 내보내기" title="일정 내보내기">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 3v12m0 0 4-4m-4 4-4-4M5 21h14" /></svg>
          </button>
          <label class="icon-button file-button" aria-label="일정 가져오기" title="일정 가져오기">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 21V9m0 0 4 4m-4-4-4 4M5 3h14" /></svg>
            <input id="importInput" type="file" accept="application/json" />
          </label>
        </div>
      </header>

      <main class="layout">
        <aside class="side-panel" aria-label="일정 입력과 요약">
          <section class="section-block">
            <div class="section-heading">
              <h2 id="formTitle">새 일정</h2>
              <button class="ghost-button hidden" id="cancelEditButton" type="button">편집 취소</button>
            </div>

            <form class="schedule-form" id="scheduleForm">
              <input id="editingId" type="hidden" />

              <label>
                <span>분류</span>
                <select id="categoryInput" required>
                  <option value="homeroom">담임 일정</option>
                  <option value="department">부서 일정</option>
                  <option value="subject">교과교사 일정</option>
                </select>
              </label>

              <label>
                <span>일정명</span>
                <input id="titleInput" type="text" maxlength="60" placeholder="예: 2학년 상담 주간" required />
              </label>

              <div class="form-grid">
                <label>
                  <span>날짜</span>
                  <input id="dateInput" type="date" required />
                </label>
                <label>
                  <span>장소</span>
                  <input id="placeInput" type="text" maxlength="40" placeholder="교무실" />
                </label>
              </div>

              <div class="form-grid">
                <label>
                  <span>시작</span>
                  <input id="startTimeInput" type="time" />
                </label>
                <label>
                  <span>종료</span>
                  <input id="endTimeInput" type="time" />
                </label>
              </div>

              <label>
                <span>메모</span>
                <textarea id="memoInput" maxlength="240" rows="4" placeholder="준비물, 전달 사항, 관련 학급 등을 적어두세요."></textarea>
              </label>

              <button class="primary-button" type="submit">
                <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" /></svg>
                <span id="submitLabel">일정 추가</span>
              </button>
            </form>
          </section>

          <section class="section-block stats-block">
            <div class="section-heading">
              <h2>요약</h2>
              <button class="ghost-button" id="clearCompletedButton" type="button">완료 정리</button>
            </div>
            <div class="stats-grid" id="statsGrid"></div>
          </section>

          <section class="section-block upcoming-block">
            <div class="section-heading">
              <h2>가까운 일정</h2>
            </div>
            <div class="compact-list" id="upcomingList"></div>
          </section>
        </aside>

        <section class="workspace" aria-label="일정 보기">
          <div class="toolbar">
            <div class="month-control">
              <button class="icon-button" id="prevMonthButton" type="button" aria-label="이전 달" title="이전 달">
                <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6" /></svg>
              </button>
              <button class="today-button" id="todayButton" type="button">오늘</button>
              <button class="icon-button" id="nextMonthButton" type="button" aria-label="다음 달" title="다음 달">
                <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6" /></svg>
              </button>
              <h2 id="monthLabel"></h2>
            </div>

            <div class="view-toggle" role="group" aria-label="보기 전환">
              <button class="toggle-button active" id="calendarViewButton" type="button" data-view="calendar">
                <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z" /></svg>
                월간
              </button>
              <button class="toggle-button" id="listViewButton" type="button" data-view="list">
                <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" /></svg>
                목록
              </button>
            </div>
          </div>

          <div class="filter-row">
            <label class="search-box">
              <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m21 21-4.35-4.35M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z" /></svg>
              <input id="searchInput" type="search" placeholder="일정명, 장소, 메모 검색" />
            </label>

            <div class="category-tabs" role="group" aria-label="분류 필터">
              <button class="category-tab active" type="button" data-filter="all">전체</button>
              <button class="category-tab" type="button" data-filter="homeroom">담임</button>
              <button class="category-tab" type="button" data-filter="department">부서</button>
              <button class="category-tab" type="button" data-filter="subject">교과</button>
            </div>
          </div>

          <div class="legend" aria-label="분류 색상">
            <span><i class="dot homeroom"></i>담임 일정</span>
            <span><i class="dot department"></i>부서 일정</span>
            <span><i class="dot subject"></i>교과교사 일정</span>
          </div>

          <div class="calendar-view" id="calendarView">
            <div class="weekday-row" aria-hidden="true">
              <span>일</span>
              <span>월</span>
              <span>화</span>
              <span>수</span>
              <span>목</span>
              <span>금</span>
              <span>토</span>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
          </div>

          <div class="list-view hidden" id="listView">
            <div class="agenda-list" id="agendaList"></div>
          </div>
        </section>
      </main>
    </div>

    <template id="eventTemplate">
      <article class="event-item">
        <div class="event-marker"></div>
        <div class="event-content">
          <div class="event-topline">
            <span class="event-category"></span>
            <span class="event-time"></span>
          </div>
          <h3></h3>
          <p class="event-meta"></p>
          <p class="event-memo"></p>
        </div>
        <div class="event-actions">
          <button class="icon-button complete-event" type="button" aria-label="완료 표시" title="완료 표시">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m20 6-11 11-5-5" /></svg>
          </button>
          <button class="icon-button edit-event" type="button" aria-label="수정" title="수정">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m12 20 9-9-8-8-9 9-1 9 9-1ZM14 5l5 5" /></svg>
          </button>
          <button class="icon-button delete-event" type="button" aria-label="삭제" title="삭제">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M6 6l1 15h10l1-15" /></svg>
          </button>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
